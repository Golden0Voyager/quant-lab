name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check quant_lab/core/ tests/v2/

      - name: Type check
        run: uv run mypy quant_lab/core/ 2>&1 | grep -E "^quant_lab/core/|Found.*errors" || true

      - name: Test with coverage
        run: uv run pytest tests/v2/ --cov --cov-report=term-missing -q

      - name: Enforce coverage threshold
        run: uv run coverage report
