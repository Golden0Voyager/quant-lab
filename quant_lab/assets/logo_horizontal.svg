<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 200" width="590" height="200">

  <!--
    量知 AIpha — Horizontal Geek Edition (White)
    5×7 grid, golden ratio:
    • sq=24, gap=8 → solid:negative area ≈ φ (20160:12672 = 1.590)
    • Text: font cascade 42/26/12/11, gaps 50/28/19 (Fibonacci-scaled)
    • Text height = 90% of graphic height (137/152)
    • Grid step = sq+gap = 32
    path: 4→3→2→3→2→1→0
  -->

  <defs>
    <filter id="lineglow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circuit grid lines (through block centers) -->
  <g stroke="#d6dce6" stroke-width="0.5" opacity="0.4">
    <line x1="20" y1="12" x2="20" y2="188"/>
    <line x1="52" y1="12" x2="52" y2="188"/>
    <line x1="84" y1="12" x2="84" y2="188"/>
    <line x1="116" y1="12" x2="116" y2="188"/>
    <line x1="148" y1="12" x2="148" y2="188"/>
    <line x1="180" y1="12" x2="180" y2="188"/>
    <line x1="212" y1="12" x2="212" y2="188"/>
    <line x1="-2" y1="36" x2="228" y2="36"/>
    <line x1="-2" y1="68" x2="228" y2="68"/>
    <line x1="-2" y1="100" x2="228" y2="100"/>
    <line x1="-2" y1="132" x2="228" y2="132"/>
    <line x1="-2" y1="164" x2="228" y2="164"/>
  </g>

  <!-- Klein blue blocks (sq=24, gap=8) -->
  <g fill="#002FA7" fill-opacity="0.85" stroke="#002FA7" stroke-opacity="0.12" stroke-width="0.5">
    <!-- Col 0: rows 0-3 -->
    <rect x="8" y="24" width="24" height="24" rx="2"/>
    <rect x="8" y="56" width="24" height="24" rx="2"/>
    <rect x="8" y="88" width="24" height="24" rx="2"/>
    <rect x="8" y="120" width="24" height="24" rx="2"/>
    <!-- Col 1: rows 0-2, 4 -->
    <rect x="40" y="24" width="24" height="24" rx="2"/>
    <rect x="40" y="56" width="24" height="24" rx="2"/>
    <rect x="40" y="88" width="24" height="24" rx="2"/>
    <rect x="40" y="152" width="24" height="24" rx="2"/>
    <!-- Col 2: rows 0-1, 3-4 -->
    <rect x="72" y="24" width="24" height="24" rx="2"/>
    <rect x="72" y="56" width="24" height="24" rx="2"/>
    <rect x="72" y="120" width="24" height="24" rx="2"/>
    <rect x="72" y="152" width="24" height="24" rx="2"/>
    <!-- Col 3: rows 0-2, 4 -->
    <rect x="104" y="24" width="24" height="24" rx="2"/>
    <rect x="104" y="56" width="24" height="24" rx="2"/>
    <rect x="104" y="88" width="24" height="24" rx="2"/>
    <rect x="104" y="152" width="24" height="24" rx="2"/>
    <!-- Col 4: rows 0-1, 3-4 -->
    <rect x="136" y="24" width="24" height="24" rx="2"/>
    <rect x="136" y="56" width="24" height="24" rx="2"/>
    <rect x="136" y="120" width="24" height="24" rx="2"/>
    <rect x="136" y="152" width="24" height="24" rx="2"/>
    <!-- Col 5: rows 0, 2-4 -->
    <rect x="168" y="24" width="24" height="24" rx="2"/>
    <rect x="168" y="88" width="24" height="24" rx="2"/>
    <rect x="168" y="120" width="24" height="24" rx="2"/>
    <rect x="168" y="152" width="24" height="24" rx="2"/>
    <!-- Col 6: rows 1-4 -->
    <rect x="200" y="56" width="24" height="24" rx="2"/>
    <rect x="200" y="88" width="24" height="24" rx="2"/>
    <rect x="200" y="120" width="24" height="24" rx="2"/>
    <rect x="200" y="152" width="24" height="24" rx="2"/>
  </g>

  <!-- Electric green trend line — fuzzy glow, stroke-width 3 -->
  <polyline points="20,164 52,132 84,100 116,132 148,100 180,68 212,36"
    fill="none" stroke="#00ffa3" stroke-width="3" opacity="0.75"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#lineglow)"/>

  <!-- Circuit nodes -->
  <g fill="#00ffa3">
    <circle cx="20" cy="164" r="2" opacity="0.5"/>
    <circle cx="52" cy="132" r="2" opacity="0.5"/>
    <circle cx="84" cy="100" r="2" opacity="0.6"/>
    <circle cx="116" cy="132" r="2" opacity="0.5"/>
    <circle cx="148" cy="100" r="2" opacity="0.6"/>
    <circle cx="180" cy="68" r="2" opacity="0.7"/>
    <circle cx="212" cy="36" r="2.5" opacity="0.8"/>
  </g>

  <!-- Digital coordinates -->
  <g font-family="SF Mono, Fira Code, Menlo, monospace" font-size="5" fill="#00c082" opacity="0.2">
    <text x="26" y="174">0,4</text>
    <text x="90" y="95">2,2</text>
    <text x="122" y="143">3,3</text>
    <text x="218" y="31">6,0</text>
  </g>

  <!-- Signal red K-line (no shadow) -->
  <g fill="#E63946">
    <rect x="8"   y="152" width="24" height="24" rx="4"/>
    <rect x="40"  y="120" width="24" height="24" rx="4"/>
    <rect x="72"  y="88"  width="24" height="24" rx="4"/>
    <rect x="104" y="120" width="24" height="24" rx="4"/>
    <rect x="136" y="88"  width="24" height="24" rx="4"/>
    <rect x="168" y="56"  width="24" height="24" rx="4"/>
  </g>

  <!-- Peak block — Signal red (no shadow) -->
  <rect x="200" y="24" width="24" height="24" rx="4" fill="#E63946"/>

  <!-- Divider -->
  <line x1="260" y1="36" x2="260" y2="164" stroke="#002FA7" stroke-width="1" opacity="0.08"/>

  <!--
    Text — font cascade 42→26→12→11 (golden ratio + subsidiary)
    Baselines: 69, 119, 147, 166 → gaps 50, 28, 19 (Fibonacci-scaled)
    Visual height: y=32 to y=169 = 137px = 90% of graphic 152px
    Centered at y≈100
  -->

  <!-- Chinese brand name -->
  <text x="278" y="69" text-anchor="start"
    font-family="Source Han Sans SC, Noto Sans SC, PingFang SC, sans-serif"
    font-size="42" font-weight="500" fill="#002FA7" letter-spacing="1">量知 <tspan font-family="DIN Alternate, DIN Condensed, Roboto Condensed, sans-serif" font-weight="700" letter-spacing="1"><tspan fill="#E63946">AI</tspan>pha</tspan></text>

  <!-- English brand name (42/φ ≈ 26px, visual gap 50px) -->
  <text x="280" y="119" text-anchor="start"
    font-family="DIN Alternate, DIN Condensed, Roboto Condensed, sans-serif"
    font-size="26" font-weight="500" fill="#64748b" letter-spacing="1.5">Quant<tspan fill="#00c082" textLength="21" lengthAdjust="spacingAndGlyphs">Z</tspan> <tspan fill="#E63946">AI</tspan>pha</text>

  <!-- Chinese slogan (visual gap 28px) -->
  <text x="280" y="147" text-anchor="start"
    font-family="Source Han Sans SC, Noto Sans SC, PingFang SC, sans-serif"
    font-size="12" font-weight="400" fill="#94a3b8" letter-spacing="1">深度洞察数据，捕捉超越市场的 Alpha</text>

  <!-- English slogan (visual gap 19px) -->
  <text x="280" y="166" text-anchor="start"
    font-family="DIN Alternate, DIN Condensed, Roboto Condensed, sans-serif"
    font-size="11" font-weight="400" fill="#b0b8c8" letter-spacing="0.8">Decoding Markets with AI for Consistent Alpha.</text>

</svg>
